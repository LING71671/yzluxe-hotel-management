<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Schedule Management</title>
      <link rel="stylesheet" href="../public/common.css">
      <link rel="stylesheet" href="../css/employee_schedule_management.css">
</head>
<body>
    <div class="main">
        <div class="content">
            <div id="scheduleSection" class="section">
                <h1>Schedule Management</h1>

                <div class="schedule-type">
                    <h3>Schedule Type</h3>
                    <label>
                        <input type="radio" name="scheduleType" value="fixed" checked onchange="toggleScheduleType()"> Fixed Schedule
                    </label>
                    <label style="margin-left: 20px;">
                        <input type="radio" name="scheduleType" value="temporary" onchange="toggleScheduleType()"> Temporary Schedule
                    </label>
                </div>

                <div class="form-group">
                    <label for="employeeSelect">Employee:</label>
                    <select id="employeeSelect" required>
                        <option value="">Select Employee</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="scheduleDate">Schedule Date:</label>
                    <input type="week" id="scheduleDate" required>
                </div>

                <h3>Daily Schedule</h3>
                <div id="dailySchedules">
                    <div class="day-schedule" data-day="Monday">
                        <label>Monday:</label>
                        <input type="time" id="mon-start" value="09:00">
                        <span>to</span>
                        <input type="time" id="mon-end" value="18:00">
                        <select id="mon-type">
                            <option value="work">Work</option>
                            <option value="dayoff">Day Off</option>
                        </select>
                    </div>
                    <div class="day-schedule" data-day="Tuesday">
                        <label>Tuesday:</label>
                        <input type="time" id="tue-start" value="09:00">
                        <span>to</span>
                        <input type="time" id="tue-end" value="18:00">
                        <select id="tue-type">
                            <option value="work">Work</option>
                            <option value="dayoff">Day Off</option>
                        </select>
                    </div>
                    <div class="day-schedule" data-day="Wednesday">
                        <label>Wednesday:</label>
                        <input type="time" id="wed-start" value="09:00">
                        <span>to</span>
                        <input type="time" id="wed-end" value="18:00">
                        <select id="wed-type">
                            <option value="work">Work</option>
                            <option value="dayoff">Day Off</option>
                        </select>
                    </div>
                    <div class="day-schedule" data-day="Thursday">
                        <label>Thursday:</label>
                        <input type="time" id="thu-start" value="09:00">
                        <span>to</span>
                        <input type="time" id="thu-end" value="18:00">
                        <select id="thu-type">
                            <option value="work">Work</option>
                            <option value="dayoff">Day Off</option>
                        </select>
                    </div>
                    <div class="day-schedule" data-day="Friday">
                        <label>Friday:</label>
                        <input type="time" id="fri-start" value="09:00">
                        <span>to</span>
                        <input type="time" id="fri-end" value="18:00">
                        <select id="fri-type">
                            <option value="work">Work</option>
                            <option value="dayoff">Day Off</option>
                        </select>
                    </div>
                    <div class="day-schedule" data-day="Saturday">
                        <label>Saturday:</label>
                        <input type="time" id="sat-start" value="09:00">
                        <span>to</span>
                        <input type="time" id="sat-end" value="18:00">
                        <select id="sat-type">
                            <option value="work">Work</option>
                            <option value="dayoff" selected>Day Off</option>
                        </select>
                    </div>
                    <div class="day-schedule" data-day="Sunday">
                        <label>Sunday:</label>
                        <input type="time" id="sun-start" value="09:00">
                        <span>to</span>
                        <input type="time" id="sun-end" value="18:00">
                        <select id="sun-type">
                            <option value="work">Work</option>
                            <option value="dayoff" selected>Day Off</option>
                        </select>
                    </div>
                </div>

                <button class="btn-primary" onclick="saveSchedule()">Save Schedule</button>
                <button class="btn-secondary" onclick="loadExistingSchedule()">Load Existing Schedule</button>

                <h3>Schedule Preview</h3>
                <table id="schedulePreview">
                    <thead>
                        <tr>
                            <th>Day</th>
                            <th>Start Time</th>
                            <th>End Time</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="../js/employee_schedule_management.js"></script>
</body>
</html>
