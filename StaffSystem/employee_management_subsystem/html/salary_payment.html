<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Salary Payment</title>
    <link rel="stylesheet" href="../public/common.css">
    <link rel="stylesheet" href="../css/salary_payment.css">
</head>
<body>
    <div class="main">
        <div class="content">
             <div class="header">
                 <h1>Salary Payment</h1>
             </div>

            <div class="salary-form">
                <div class="form-group">
                    <label for="paymentMonth">Month:</label>
                    <select id="paymentMonth">
                        <option value="">Select Month</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="paymentMethod">Payment Method:</label>
                    <select id="paymentMethod">
                        <option value="bank_transfer">Bank Transfer</option>
                        <option value="cash">Cash Payment</option>
                        <option value="check">Check</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="payDate">Payment Date:</label>
                    <input type="date" id="payDate">
                </div>
                <button onclick="processBatchPayment()">Process Batch Payment</button>
            </div>

            <h2>Pending Payments</h2>
            <table id="pendingPayments">
                <thead>
                    <tr>
                        <th>Employee</th>
                        <th>Month</th>
                        <th>Net Salary</th>
                        <th>Payment Method</th>
                        <th>Pay Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

            <h2>Payment History</h2>
            <table id="paymentHistory">
                <thead>
                    <tr>
                        <th>Employee</th>
                        <th>Month</th>
                        <th>Net Salary</th>
                        <th>Payment Method</th>
                        <th>Pay Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
    <script src="../js/salary_payment.js"></script>
<script src="../../../shared/site-nav.js"></script>
</body>
